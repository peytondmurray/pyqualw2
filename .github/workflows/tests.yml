name: Tests
on: [pull_request]
permissions: {}
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    env:
      DISPLAY: ':99.0'
    steps:
      - name: Install Wine
        run: |
          sudo apt update
          sudo apt install -y wine

      # https://github.com/hajimehoshi/ebiten/blob/main/.github/workflows/test.yml
      # https://stackoverflow.com/a/72072732/8100451
      - name: Set up virtual X server
        run: |
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          pip install -v '.[test]'

      - name: Run tests
        run: |
          pytest --e2e

      - name: Upload matplotlib test plots if tests fail
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: result-images
          path: result_images/
          if-no-files-found: ignore
