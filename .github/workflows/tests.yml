name: Tests
on: [pull_request]
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    env:
      DISPLAY: ':99.0'
    steps:
      - name: Install Wine
        run: |
          sudo apt update
          sudo apt install -y wine

      # https://github.com/hajimehoshi/ebiten/blob/main/.github/workflows/test.yml
      # https://stackoverflow.com/a/72072732/8100451
      - name: Set up virtual X server
        run: |
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          pip install -v '.[test]'

      - name: Run tests
        run: |
          pytest
